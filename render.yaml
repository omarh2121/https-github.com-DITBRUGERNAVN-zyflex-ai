services:
  - type: web
    name: zyflex-demand-radar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PORT
        value: 10000
