<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zyflex AI – Log ind</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #111; border: 1px solid #222; border-radius: 20px;
    padding: 48px 40px; width: 100%; max-width: 420px; text-align: center;
  }
  .logo { font-size: 2.5rem; margin-bottom: 8px; }
  .title { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
  .sub { color: #666; font-size: .9rem; margin-bottom: 36px; }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: #fff; color: #111; border: none; border-radius: 12px;
    padding: 14px 24px; font-size: 1rem; font-weight: 700;
    cursor: pointer; width: 100%; margin-bottom: 16px;
    transition: background .2s;
  }
  .google-btn:hover { background: #f0f0f0; }
  .google-logo { width: 22px; height: 22px; }
  .divider { color: #444; font-size: .8rem; margin: 20px 0; }
  .note { color: #555; font-size: .8rem; margin-top: 24px; }
  .error { background: #1a0000; border: 1px solid #f00; border-radius: 8px;
           padding: 12px; color: #ff6666; font-size: .85rem; margin-bottom: 16px; display:none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🚕</div>
  <div class="title">Zyflex AI</div>
  <div class="sub">Palantir for Taxa – Log ind for at fortsætte</div>

  <div class="error" id="err-msg"></div>

  <!-- Google Sign-In knap -->
  <button class="google-btn" onclick="startGoogleLogin()">
    <svg class="google-logo" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.5 2.6 13.5l7.9 6.1C12.4 13.3 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
      <path fill="#FBBC05" d="M10.5 28.4A14.5 14.5 0 0 1 9.5 24c0-1.5.3-3 .8-4.4l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6.3z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6.1C6.6 42.5 14.6 48 24 48z"/>
    </svg>
    Log ind med Google
  </button>

  <div class="note">Første gang? Du oprettes automatisk. Kontakt Mo for adgang.</div>
</div>

<script>
const API_BASE = window.location.origin;

async function startGoogleLogin() {
  // Hent Google Client ID fra server
  try {
    const resp = await fetch(`${API_BASE}/api/auth/config`);
    const cfg  = await resp.json();
    if (!cfg.google_client_id) {
      showError("Google login er ikke konfigureret endnu. Kontakt admin.");
      return;
    }
    // Åbn Google OAuth popup
    const params = new URLSearchParams({
      client_id:     cfg.google_client_id,
      redirect_uri:  `${API_BASE}/api/auth/callback`,
      response_type: "code",
      scope:         "email profile",
      access_type:   "online",
      prompt:        "select_account",
    });
    window.location.href = `https://accounts.google.com/o/oauth2/auth?${params}`;
  } catch(e) {
    showError("Kunne ikke forbinde til server. Prøv igen.");
  }
}

function showError(msg) {
  const el = document.getElementById("err-msg");
  el.textContent = msg;
  el.style.display = "block";
}

// Tjek om vi er logget ind allerede
const tok = localStorage.getItem("zyflex_token");
if (tok) {
  fetch(`${API_BASE}/api/auth/me`, { headers: { Authorization: `Bearer ${tok}` }})
    .then(r => r.json())
    .then(d => {
      if (d.email) {
        window.location.href = d.is_admin ? "/admin" : "/";
      }
    }).catch(() => {});
}
</script>
</body>
</html>
